<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <style>

        /* NAVBAR */

        .navbar{
            position:fixed;
            top:0;
            left:0;
            width:100%;

            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:16px 70px;

            background:rgba(255,255,255,0.96);

            backdrop-filter:blur(12px);

            z-index:1000;

            box-shadow:0 2px 18px rgba(0,0,0,0.06);
        }

        /* LOGO */

        .logo{
            display:flex;
            align-items:center;
            gap:12px;
            text-decoration:none;
        }

        .logo img{
            height:55px;
            width:auto;
            object-fit:contain;
        }

        .logo span{
            font-size:28px;
            font-weight:700;
            color:#f26522;
        }

        /* NAV LINKS */

        .nav-links{
            display:flex;
            align-items:center;
        }

        .nav-links a{
            text-decoration:none;
            color:#222;
            margin:0 16px;
            font-weight:600;
            transition:0.3s;
        }

        .nav-links a:hover{
            color:#f26522;
        }

        /* CONTACT BUTTON */

        .contact-btn{
            background:#f26522;
            color:white !important;
            padding:12px 24px;
            border-radius:40px;
        }

        /* MOBILE */

        @media(max-width:768px){

            .navbar{
                padding:15px 20px;
                flex-direction:column;
            }

            .nav-links{
                margin-top:15px;
                flex-wrap:wrap;
                justify-content:center;
            }

            .nav-links a{
                margin:8px;
            }

            .logo img{
                height:45px;
            }

            .logo span{
                font-size:22px;
            }
        }

    </style>

</head>

<body>

<div th:fragment="navbar">

    <div class="navbar">

        <!-- LOGO -->

        <a href="/homepage" class="logo">

            <img src="/images/logo.png" alt="Logo">

            <span>Shanti Marg Yatra</span>

        </a>

        <!-- NAVIGATION -->

        <div class="nav-links">

            <a href="/homepage">Home</a>

            <a href="/about">About</a>

            <a href="/packages">Tours</a>

            <a href="/services">Services</a>

            <a href="https://wa.me/916263657357"
               class="contact-btn">

                Contact

            </a>

        </div>

    </div>

</div>

</body>

</html>
