<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Register - Shanti Marg Yatra</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.register-container {
    background: rgba(255,255,255,0.95);
    padding: 35px;
    border-radius: 18px;
    width: 380px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    text-align: center;
    backdrop-filter: blur(10px);
}

/* TITLE */
.register-container h2 {
    margin-bottom: 20px;
    color: #f26522;
    font-weight: 700;
}

/* FORM */
.form-group {
    text-align: left;
    margin-bottom: 15px;
}

label {
    font-size: 14px;
    color: #444;
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    outline: none;
    transition: 0.3s;
    font-size: 14px;
}

input:focus {
    border-color: #f26522;
    box-shadow: 0 0 0 3px rgba(242,101,34,0.15);
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #f26522, #ff914d);
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 50px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
    margin-top: 10px;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(242,101,34,0.3);
}

/* FOOTER */
.footer-text {
    margin-top: 15px;
    font-size: 12px;
    color: #777;
}

/* ERROR TEXT */
.error {
    color: red;
    font-size: 12px;
    margin-top: 5px;
}

</style>

</head>

<body>

<div class="register-container">

    <h2>🛕 Book Your Spiritual Journey</h2>

    <form th:action="@{/register}" method="post" th:object="${user}">

        <input type="hidden" name="packageId" th:value="${packageId}" />

        <!-- NAME -->
        <div class="form-group">
            <label>Your Name</label>
            <input type="text" th:field="*{name}" placeholder="Enter your name" required />
        </div>

        <!-- MOBILE -->
        <div class="form-group">
            <label>Mobile Number</label>
            <input 
                type="text"
                th:field="*{mobile}"
                placeholder="Enter 10 digit mobile number"
                maxlength="10"
                pattern="[0-9]{10}"
                required
            />
        </div>

        <button type="submit" class="btn">
            Continue Booking
        </button>

    </form>

    <div class="footer-text">
        🔒 Your details are safe with us
    </div>

</div>

</body>

</html>
