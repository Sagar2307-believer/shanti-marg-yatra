<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Register - Shanti Marg Yatra</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .register-container {
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        width: 350px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        text-align: center;
    }

    .register-container h2 {
        margin-bottom: 20px;
        color: #333;
    }

    .form-group {
        text-align: left;
        margin-bottom: 15px;
    }

    label {
        font-size: 14px;
        color: #555;
        display: block;
        margin-bottom: 5px;
    }

    input {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        outline: none;
        transition: border 0.3s;
    }

    input:focus {
        border-color: #ff758c;
    }

    .btn {
        width: 100%;
        padding: 12px;
        background: #ff758c;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.3s ease;
    }

    .btn:hover {
        background: #e84363;
    }

    .footer-text {
        margin-top: 15px;
        font-size: 12px;
        color: #888;
    }

</style>

</head>

<body>

<div class="register-container">

    <h2>🛕 Register for Booking</h2>

    <form th:action="@{/register}" method="post" th:object="${user}">

        <input type="hidden" name="packageId" th:value="${packageId}" />

        <div class="form-group">
            <label>Your Name</label>
            <input type="text" th:field="*{name}" placeholder="Enter your name" required />
        </div>

        <div class="form-group">
            <label>Mobile Number</label>
            <input type="text" th:field="*{mobile}" placeholder="Enter mobile number" required />
        </div>

        <button type="submit" class="btn">
            Continue Booking
        </button>

    </form>

    <div class="footer-text">
        Your details are सुरक्षित with us 🔒
    </div>

</div>

</body>
</html>
