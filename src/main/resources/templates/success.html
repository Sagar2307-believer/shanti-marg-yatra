<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Booking Confirmed - Shanti Marg Yatra</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f5f7fa;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .invoice-container {
        background: #fff;
        padding: 30px 40px;
        border-radius: 12px;
        width: 450px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
    }

    .invoice-details {
        border-top: 1px solid #ddd;
        border-bottom: 1px solid #ddd;
        padding: 15px 0;
        margin-bottom: 20px;
    }

    .invoice-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        font-size: 15px;
    }

    .invoice-row b {
        color: #333;
    }

    .total-row {
        font-weight: bold;
        font-size: 16px;
        border-top: 1px solid #ddd;
        padding-top: 10px;
        margin-top: 10px;
        color: #667eea;
    }

    .btn-group {
        display: flex;
        justify-content: space-between;
        margin-top: 25px;
    }

    .btn {
        padding: 10px 15px;
        background: #667eea;
        color: white;
        text-decoration: none;
        border-radius: 6px;
        font-size: 14px;
        transition: background 0.3s;
    }

    .btn:hover {
        background: #5a67d8;
    }

    .footer-text {
        text-align: center;
        margin-top: 20px;
        font-size: 13px;
        color: #888;
    }
</style>
</head>
<body>

<div class="invoice-container">
    <h2>✅ Booking Confirmed!</h2>

    <div class="invoice-details">
        <div class="invoice-row">
            <span>User Name:</span>
            <span th:text="${userName}"></span>
        </div>
        <div class="invoice-row">
            <span>Package:</span>
            <span th:text="${packageName}"></span>
        </div>
        <div class="invoice-row">
            <span>Travel Date:</span>
            <span th:text="${#temporals.format(travelDate,'dd/MM/yyyy')}"></span>
        </div>
        <div class="invoice-row">
            <span>Arrival Time:</span>
            <span th:text="${arrivalTime}"></span>
        </div>
        <div class="invoice-row">
            <span>Number of Persons:</span>
            <span th:text="${persons}"></span>
        </div>
        <div class="invoice-row total-row">
            <span>Total Price:</span>
            <span>₹<span th:text="${price}"></span></span>
        </div>
    </div>

    <div class="btn-group">
        <a href="/packages" class="btn">Explore More Packages</a>
        <a href="https://wa.me/919098488697" class="btn">Contact Us</a>
    </div>

    <div class="footer-text">
        Thank you for booking with Shanti Marg Yatra 🛕 
        Our team will connect you in some time.
    </div>
</div>

</body>
</html>
