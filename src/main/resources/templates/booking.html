<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Confirm Booking - Shanti Marg Yatra</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* CARD */
.booking-container {
    background: rgba(255,255,255,0.96);
    padding: 35px 40px;
    border-radius: 18px;
    width: 420px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.35);
    backdrop-filter: blur(10px);
}

/* TITLE */
.booking-container h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #f26522;
    font-weight: 700;
}

/* FORM */
.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    font-weight: 600;
    margin-bottom: 6px;
    color: #444;
    font-size: 14px;
}

/* INPUTS */
input[type="date"],
input[type="time"],
input[type="number"] {

    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    outline: none;
    font-size: 14px;
    transition: 0.3s;
}

input:focus {
    border-color: #f26522;
    box-shadow: 0 0 0 3px rgba(242,101,34,0.15);
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #f26522, #ff914d);
    color: white;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(242,101,34,0.3);
}

/* FOOTER */
.footer-text {
    text-align: center;
    margin-top: 15px;
    font-size: 12px;
    color: #777;
}
/* ---------------- LOADER ---------------- */

.booking-loader{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(15,23,42,.88);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999999;
    animation:fadeIn .3s ease;
}

.loader-card{

    width:430px;
    background:#fff;
    border-radius:20px;
    padding:35px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.35);

}

.temple-icon{

    font-size:48px;
    margin-bottom:12px;

}

.spinner{

    width:70px;
    height:70px;
    margin:20px auto;
    border-radius:50%;
    border:6px solid #ececec;
    border-top:6px solid #f26522;
    animation:spin 1s linear infinite;

}

.loader-card h2{

    color:#f26522;
    margin:15px 0 8px;

}

.loader-card p{

    color:#666;
    line-height:1.6;

}

.progress-container{

    width:100%;
    height:8px;
    background:#eee;
    border-radius:50px;
    margin:25px 0;
    overflow:hidden;

}

.progress-bar{

    width:40%;
    height:100%;
    background:linear-gradient(90deg,#f26522,#ff914d);
    animation:loading 2s ease-in-out infinite;

}

.steps{

    text-align:left;
    margin:20px 0;

}

.step{

    padding:10px 0;
    font-size:15px;
    color:#666;

}

.step.active{

    color:#f26522;
    font-weight:600;

}

.loader-card small{

    color:#999;

}

@keyframes spin{

    100%{
        transform:rotate(360deg);
    }

}

@keyframes loading{

    0%{
        margin-left:-40%;
    }

    100%{
        margin-left:100%;
    }

}

@keyframes fadeIn{

    from{
        opacity:0;
    }

    to{
        opacity:1;
    }

}

</style>

</head>

<body>

<div class="booking-container">

    <h2>🛕 Confirm Your Booking</h2>
    <form id="bookingForm"
      th:action="@{/booking}"
      method="post"
      th:object="${booking}">

        <input type="hidden" th:field="*{userId}" />
        <input type="hidden" th:field="*{packageId}" />

        <div class="form-group">
            <label>Date of Arrival</label>
            <input type="date" th:field="*{travelDate}" id="travelDate" required />
        </div>

        <div class="form-group">
            <label>Time of Arrival</label>
            <input type="time" th:field="*{arrivalTime}" required />
        </div>

        <div class="form-group">
            <label>Number of Persons</label>
            <input type="number" th:field="*{persons}" min="1" value="1" required />
        </div>
<button type="submit" class="btn" id="submitBtn">
    Confirm Booking
</button>

    </form>

    <div class="footer-text">
        We will contact you shortly after booking 📞
    </div>

</div>
<div id="bookingLoader" class="booking-loader">

    <div class="loader-card">

        <div class="temple-icon">🛕</div>

        <div class="spinner"></div>

        <h2>Confirming Your Booking</h2>

        <p>
            Please wait while we securely confirm your spiritual journey.
        </p>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <div class="steps">

            <div class="step active">
                ✅ Validating your details
            </div>

            <div class="step">
                ⏳ Confirming your booking
            </div>

            <div class="step">
                📄 Generating confirmation
            </div>

        </div>

        <small>
            Please do not refresh or close this page.
        </small>

    </div>

</div>

<!-- DATE VALIDATION SCRIPT -->
<script>

    const today = new Date().toISOString().split('T')[0];
    document.getElementById("travelDate").setAttribute("min", today);

    const bookingForm = document.getElementById("bookingForm");
    const bookingLoader = document.getElementById("bookingLoader");
    const submitBtn = document.getElementById("submitBtn");

    bookingForm.addEventListener("submit", function () {

        submitBtn.disabled = true;
        submitBtn.innerHTML = "Please Wait...";

        bookingLoader.style.display = "flex";

    });

</script>
</body>

</html>
