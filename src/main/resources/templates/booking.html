<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Confirm Booking - Shanti Marg Yatra</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* CARD */
.booking-container {
    background: rgba(255,255,255,0.96);
    padding: 35px 40px;
    border-radius: 18px;
    width: 420px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.35);
    backdrop-filter: blur(10px);
}

/* TITLE */
.booking-container h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #f26522;
    font-weight: 700;
}

/* FORM */
.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    font-weight: 600;
    margin-bottom: 6px;
    color: #444;
    font-size: 14px;
}

/* INPUTS */
input[type="date"],
input[type="time"],
input[type="number"] {

    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    outline: none;
    font-size: 14px;
    transition: 0.3s;
}

input:focus {
    border-color: #f26522;
    box-shadow: 0 0 0 3px rgba(242,101,34,0.15);
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #f26522, #ff914d);
    color: white;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(242,101,34,0.3);
}

/* FOOTER */
.footer-text {
    text-align: center;
    margin-top: 15px;
    font-size: 12px;
    color: #777;
}

</style>

</head>

<body>

<div class="booking-container">

    <h2>🛕 Confirm Your Booking</h2>

    <form th:action="@{/booking}" method="post" th:object="${booking}">

        <input type="hidden" th:field="*{userId}" />
        <input type="hidden" th:field="*{packageId}" />

        <div class="form-group">
            <label>Date of Arrival</label>
            <input type="date" th:field="*{travelDate}" id="travelDate" required />
        </div>

        <div class="form-group">
            <label>Time of Arrival</label>
            <input type="time" th:field="*{arrivalTime}" required />
        </div>

        <div class="form-group">
            <label>Number of Persons</label>
            <input type="number" th:field="*{persons}" min="1" value="1" required />
        </div>

        <button type="submit" class="btn">
            Confirm Booking
        </button>

    </form>

    <div class="footer-text">
        We will contact you shortly after booking 📞
    </div>

</div>

<!-- DATE VALIDATION SCRIPT -->
<script>
    const today = new Date().toISOString().split('T')[0];
    document.getElementById("travelDate").setAttribute("min", today);
</script>

</body>

</html>
