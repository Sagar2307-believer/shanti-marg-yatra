<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Confirm Booking - Shanti Marg Yatra</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .booking-container {
        background: #fff;
        padding: 30px 40px;
        border-radius: 12px;
        width: 400px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .booking-container h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        font-weight: 600;
        margin-bottom: 5px;
        color: #555;
    }

    input[type="date"], input[type="time"], input[type="number"] {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
        outline: none;
        transition: border 0.3s;
        font-size: 14px;
    }

    input:focus {
        border-color: #667eea;
    }

    .btn {
        width: 100%;
        padding: 12px;
        background: #667eea;
        color: white;
        font-size: 16px;
        font-weight: bold;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.3s ease;
    }

    .btn:hover {
        background: #5a67d8;
    }

    .footer-text {
        text-align: center;
        margin-top: 15px;
        font-size: 13px;
        color: #888;
    }
</style>
</head>
<body>

<div class="booking-container">
    <h2>🛕 Confirm Your Booking</h2>

    <form th:action="@{/booking}" method="post" th:object="${booking}">
        <input type="hidden" th:field="*{userId}" />
        <input type="hidden" th:field="*{packageId}" />

        <div class="form-group">
            <label>Date of Arrival</label>
            <input type="date" th:field="*{travelDate}" required />
        </div>

        <div class="form-group">
            <label>Time of Arrival</label>
            <input type="time" th:field="*{arrivalTime}" required />
        </div>

        <div class="form-group">
            <label>Number of Persons</label>
            <input type="number" th:field="*{persons}" min="1" value="1" required />
        </div>

        <button type="submit" class="btn">Confirm Booking</button>
    </form>

    <div class="footer-text">
        We will contact you shortly after booking 📞
    </div>
</div>

</body>
</html>
